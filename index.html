<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Date Night?</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffb6c1, #ff69b4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      width: 350px;
    }

    h1 {
      color: #ff1493;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
      position: absolute;
    }

    #yesBtn {
      background: #ff1493;
      color: white;
      left: 50%;
      transform: translateX(-50%);
      top: 140px;
    }

    #noBtn {
      background: #d3d3d3;
      color: black;
      top: 220px;
      left: 90px;
    }

    #message {
      margin-top: 220px;
      font-size: 22px;
      color: #ff1493;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Date Night on Friday? 💕<br><span style="font-size:20px;">From Aeondre 💌</span></h1>

    <button id="yesBtn">OFC I LOVE YOU!!!!</button>
    <button id="noBtn">No Im good</button>

    <div id="message"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    noBtn.addEventListener("mouseover", () => {
      const maxX = window.innerWidth - noBtn.offsetWidth;
      const maxY = window.innerHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    });

    yesBtn.addEventListener("click", () => {
      message.innerHTML = "YAYYYYY 💖 See you Friday baby 😘";
    });
  </script>

</body>
</html>
